<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tribute Page</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <main id="main">

    <h1 id="title">Nelson Mandela</h1>

    <figure id="img-div">
      <img
        id="image"
        src="https://i.ibb.co/PZ6JdFRN/Nelson-Mandela.webp"
        alt="Nelson Mandela smiling"
      >

      <figcaption id="img-caption">
        Nelson Mandela was a South African leader and activist who fought against apartheid.
      </figcaption>
    </figure>

    <section id="tribute-info">
      Nelson Mandela spent many years fighting for equality, justice, and human rights. 
      He became the first Black president of South Africa and inspired millions of people around the world.
    </section>

    <a
      id="tribute-link"
      href="https://en.wikipedia.org/wiki/Nelson_Mandela"
      target="_blank"
    >
      Learn more about Nelson Mandela
    </a>

  </main>

</body>
</html>
